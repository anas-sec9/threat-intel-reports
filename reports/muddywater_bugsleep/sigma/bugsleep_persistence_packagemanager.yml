title: BugSleep Persistence - Execution from ProgramData PackageManager
id: 97503792-70b9-42b5-9909-31832eef2b87
status: experimental
description: >
    Detects execution of BugSleep's persistence copy, which masquerades as a
    "PackageManager" binary under C:\ProgramData\PackageManager\. No legitimate
    package manager runs from that path.
references:
    - https://github.com/anas-sec9/threat-intel-reports/tree/main/reports/muddywater_bugsleep
author: Anas
date: 2026-07-07
tags:
    - attack.persistence
    - attack.defense-evasion
    - attack.t1036.005
    - attack.t1543
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\ProgramData\PackageManager\PackageManager.exe'
    condition: selection
falsepositives:
    - None expected. This path is not used by legitimate package managers.
level: high
