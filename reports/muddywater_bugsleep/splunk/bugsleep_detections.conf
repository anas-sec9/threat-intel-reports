# BugSleep (MuddyWater) — Splunk detection pack
# Deploy to: $SPLUNK_HOME/etc/apps/search/local/savedsearches.conf  (or create via Settings > Searches, Reports & Alerts)
# Assumes: Sysmon -> index=endpoint (sourcetype XmlWinEventLog), Suricata eve -> index=network
# Author: Anas | TLP:CLEAR
#
# NOTE ON FIELDS: raw Sysmon fields (SourceImage/TargetImage/DestinationIp/TargetFilename/Image)
# are extracted by Splunk_TA_microsoft_sysmon. Adjust index names if yours differ.

[BugSleep - Remote Thread Injection into msedge (T1055)]
search = index=endpoint EventCode=8 TargetImage="*\\msedge.exe" NOT SourceImage="*\\msedge.exe" \
| table _time host SourceImage TargetImage SourceProcessId TargetProcessId StartAddress StartModule StartFunction
description = BugSleep injects its payload into msedge.exe. A remote thread (Sysmon EID 8) targeting msedge from a non-Edge source is the technique. Behavioral - survives C2/hash changes.
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */2 * * * *
enableSched = 1
alert.track = 1
alert.severity = 5
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
counttype = number of events
quantity = 0
relation = greater than

[BugSleep - PackageManager Persistence Execution (T1036.005)]
search = index=endpoint EventCode=1 Image="*\\ProgramData\\PackageManager\\PackageManager.exe" \
| table _time host User ParentImage Image CommandLine Hashes
description = Execution of BugSleep's self-copy masquerading as PackageManager.exe under C:\ProgramData. No legit package manager runs from here.
dispatch.earliest_time = -5m
cron_schedule = */2 * * * *
enableSched = 1
alert.track = 1
alert.severity = 5
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0

[BugSleep - C2 Connection to 91.235.234.202 (host)]
search = index=endpoint EventCode=3 DestinationIp="91.235.234.202" \
| table _time host Image DestinationIp DestinationPort Initiated
description = Sysmon-side view of the C2 beacon (fires only if NetworkConnect logs it). Primary network detection is Suricata.
dispatch.earliest_time = -5m
cron_schedule = */2 * * * *
enableSched = 1
alert.track = 1
alert.severity = 4

[BugSleep - C2 Beacon (Suricata network sensor)]
search = index=network (dest_ip="91.235.234.202" OR alert.signature="*BugSleep*") \
| table _time src_ip dest_ip dest_port proto alert.signature
description = Network sensor view of the beacon to the hardcoded C2. This is the authoritative network detection.
dispatch.earliest_time = -5m
cron_schedule = */2 * * * *
enableSched = 1
alert.track = 1
alert.severity = 5

[BugSleep - Staging File a.txt in Public (T1074.001)]
search = index=endpoint EventCode=11 TargetFilename="*\\Users\\Public\\a.txt" \
| table _time host Image TargetFilename
description = BugSleep reads/writes C2 command data via C:\Users\Public\a.txt. Requires FileCreate logging of the Public folder (Sysmon tuning).
dispatch.earliest_time = -5m
cron_schedule = */2 * * * *
enableSched = 1
alert.track = 1
alert.severity = 3

[BugSleep - HUNT - msedge external connection with no DNS (hardcoded IP)]
search = index=endpoint EventCode=3 Image="*\\msedge.exe" Initiated="true" \
  NOT (DestinationIp="10.0.0.0/8" OR DestinationIp="172.16.0.0/12" OR DestinationIp="192.168.0.0/16" OR DestinationIp="127.0.0.0/8") \
| join type=left DestinationIp [ search index=endpoint EventCode=22 | rename QueryResults as dnsanswer | eval DestinationIp=dnsanswer | fields DestinationIp QueryName ] \
| where isnull(QueryName) \
| table _time host Image DestinationIp DestinationPort
description = The reversing insight as a hunt - Edge reaching an external IP with no preceding DNS resolution = hardcoded C2 (legit browser traffic always resolves a hostname first). Tune the join to your DNS field names.
dispatch.earliest_time = -60m
cron_schedule = */10 * * * *
enableSched = 1
alert.severity = 4
